name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: 10.0.302

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: 3.13.14

      - name: Verify release metadata and documentation links
        run: |
          python tools/verify_release_metadata.py
          python tools/verify_markdown_links.py

      - name: Verify committed animation assets
        run: python tools/verify_assets.py

      - name: Restore
        run: dotnet restore NaiWaPet.slnx

      - name: Build with analyzers
        run: dotnet build NaiWaPet.slnx --configuration Release --no-restore

      - name: Run core tests
        run: dotnet run --project tests/NaiWaPet.Core.Tests/NaiWaPet.Core.Tests.csproj --configuration Release --no-build

      - name: Build and verify complete Windows package
        shell: pwsh
        run: ./package.ps1 -SkipTests
