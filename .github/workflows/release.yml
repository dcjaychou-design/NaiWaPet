name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Build portable package
        shell: pwsh
        run: ./package.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $Assets = @(
            "artifacts/NaiWaPet-$Version-win-x64.exe",
            "artifacts/NaiWaPet-$Version-win-x64.exe.sha256",
            "artifacts/NaiWaPet-$Version-win-x64-portable.zip",
            "artifacts/NaiWaPet-$Version-win-x64-portable.zip.sha256"
          )
          gh release create "${{ github.ref_name }}" @Assets `
            --repo "${{ github.repository }}" `
            --title "NaiWaPet $Version" `
            --generate-notes `
            --verify-tag
