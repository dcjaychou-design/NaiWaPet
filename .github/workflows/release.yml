name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Build portable package
        shell: pwsh
        run: ./package.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: ./package.ps1 -Version "${{ steps.version.outputs.version }}" -SkipTests -BuildInstaller

      - name: Create installer checksum
        shell: pwsh
        run: |
          $Installer = Get-Item "artifacts/NaiWaPet-*-win-x64-setup.exe"
          $Hash = Get-FileHash $Installer.FullName -Algorithm SHA256
          Set-Content -Path "$($Installer.FullName).sha256" -Value "$($Hash.Hash.ToLowerInvariant())  $($Installer.Name)" -Encoding utf8NoBOM

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NaiWaPet-*-win-x64-portable.zip
            artifacts/NaiWaPet-*-win-x64-portable.zip.sha256
            artifacts/NaiWaPet-*-win-x64-setup.exe
            artifacts/NaiWaPet-*-win-x64-setup.exe.sha256
