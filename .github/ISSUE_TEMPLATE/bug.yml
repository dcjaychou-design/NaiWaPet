name: 错误报告
description: 报告可以稳定复现的程序错误
title: "[错误] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交问题。若问题涉及尚未公开的安全漏洞，请不要使用此表单，改用仓库的私密安全报告功能。

  - type: input
    id: version
    attributes:
      label: NaiWaPet 版本
      description: 可在“关于与开源许可”中查看，例如 1.0.1。
      placeholder: 1.0.1
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: Windows 11 24H2 x64
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: 下载文件
      options:
        - 单文件 EXE
        - 便携 ZIP
        - 自行构建
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序说明怎样稳定触发问题。
      placeholder: |
        1. 启动程序
        2. 打开……
        3. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果与日志
      description: 可粘贴错误文字，并附上 `%LOCALAPPDATA%\NaiWaPet\Logs` 中相关日志。提交前请删除个人路径等隐私信息。
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认使用的是 GitHub Release 中的最新版本。
          required: true
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
